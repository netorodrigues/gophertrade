syntax = "proto3";

package inventory.v1;

option go_package = "gophertrade/proto/inventory/v1;inventoryv1";

service InventoryService {
  rpc GetProduct (GetProductRequest) returns (GetProductResponse);
  rpc BatchUpdateStock (BatchUpdateStockRequest) returns (BatchUpdateStockResponse);
}

message GetProductRequest {
  string product_id = 1;
}

message GetProductResponse {
  string product_id = 1;
  string name = 2;
  int64 price_cents = 3;
  int32 stock_quantity = 4;
  int32 version = 5;
}

message StockUpdateItem {
  string product_id = 1;
  int32 quantity_delta = 2; // Usually negative for orders
}

message BatchUpdateStockRequest {
  repeated StockUpdateItem updates = 1;
}

message BatchUpdateStockResponse {
  bool success = 1;
  string message = 2;
}
